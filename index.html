<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Электронная копилка</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 30px;
            background: #f5f5f5;
        }
        .balance {
            font-size: 52px;
            color: #2ecc71;
            font-weight: bold;
            margin: 20px;
            padding: 20px;
            background: white;
            border-radius: 20px;
            display: inline-block;
            min-width: 300px;
        }
        .history {
            max-width: 500px;
            margin: 20px auto;
            text-align: left;
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        .history h3 {
            margin-top: 0;
            text-align: center;
        }
        .history ul {
            list-style: none;
            padding: 0;
        }
        .history li {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .status {
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>🐷 Электронная копилка</h1>
    <div class="balance">
        💰 <span id="balance">0.00</span> ₽
    </div>
    <button onclick="loadData()">🔄 Обновить</button>
    
    <div class="history">
        <h3>📋 История операций</h3>
        <ul id="history-list">
            <li>Загрузка...</li>
        </ul>
    </div>
    <div class="status" id="status"></div>

    <script>
        async function loadData() {
            document.getElementById('status').innerHTML = '⏳ Загрузка...';
            
            try {
                const response = await fetch('balance.json?t=' + Date.now());
                if (!response.ok) throw new Error('Ошибка загрузки: ' + response.status);
                
                const data = await response.json();
                
                // Обновляем баланс (переводим из копеек в рубли)
                const rubles = (data.balance / 100).toFixed(2);
                document.getElementById('balance').innerHTML = rubles;
                
                // Обновляем историю
                const historyList = document.getElementById('history-list');
                if (data.history && data.history.length > 0) {
                    historyList.innerHTML = '';
                    for (let i = 0; i < data.history.length; i++) {
                        const li = document.createElement('li');
                        li.innerHTML = data.history[i];
                        historyList.appendChild(li);
                    }
                } else {
                    historyList.innerHTML = '<li>История пуста</li>';
                }
                
                document.getElementById('status').innerHTML = '✅ Обновлено: ' + new Date().toLocaleTimeString();
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ Ошибка: ' + error.message;
                console.error(error);
            }
        }
        
        // Загружаем данные сразу и каждые 10 секунд
        loadData();
        setInterval(loadData, 10000);
    </script>
</body>
</html>
